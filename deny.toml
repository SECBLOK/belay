# cargo-deny configuration — license compliance gate for Belay.
#
# Belay is distributed under AGPL-3.0-or-later (see LICENSE / NOTICE). This
# file enforces that every dependency's license is compatible with that
# distribution. Anything whose license is NOT in `allow` below (for example
# GPL-2.0-only, LGPL-2.0, SSPL, CPAL, EUPL, CDDL) fails the check.
#
# Run locally:   cargo deny check licenses
# (Wired into CI in .github/workflows/build.yml.)

[graph]
# Evaluate every target the product ships on, so target-gated deps (e.g. the
# Linux-only nftables crate `rustables`, GPL-3.0-or-later) are included.
all-features = true

[licenses]
version = 2
confidence-threshold = 0.9
# Permissive licenses + the AGPL-compatible copyleft ones. GPL-3.0 here also
# covers GPL-3.0-or-later (rustables) — GPL-3.0 is compatible with AGPL-3.0.
# AGPL-3.0 is the project's own license.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "0BSD",
    "Zlib",
    "BSL-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    # Public-domain dedication (e.g. tiny-keccak) — permissive, AGPL-compatible.
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "OpenSSL",
    # `-or-later` is a distinct SPDX id from the plain form, so list it explicitly.
    # GPL-3.0-or-later (rustables) is compatible with the project's AGPL-3.0-or-later.
    "GPL-3.0-or-later",
    "AGPL-3.0-or-later",
]

[bans]
multiple-versions = "allow"

[advisories]
# Security-advisory scanning is a separate concern; enable when desired with
# `cargo deny check advisories`. Left permissive here so the license gate is
# the focused check.
yanked = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
