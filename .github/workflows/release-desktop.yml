name: Desktop Installers

# Builds the Tauri desktop installers on each platform's own native runner:
#  - windows-installer (windows-latest): NSIS, Authenticode-signed if
#    WINDOWS_CERTIFICATE is set, otherwise shipped unsigned (SmartScreen warns).
#  - linux-installer (ubuntu-latest): .deb + .AppImage, unsigned (Linux has no
#    installer-signing convention to speak of).
#  - macos-installer (macos-latest, matrix over x86_64/aarch64): .dmg + .app
#    per architecture, unsigned — no Apple Developer ID cert configured, so
#    Gatekeeper will show "unidentified developer" until a user right-click ->
#    Open's it (or `xattr -cr`'s the .app). Notarization is a deferred item,
#    same posture as the Windows signing cert.
#  - PRs touching desktop/web + manual dispatch: builds UNSIGNED on all three —
#    a regression check that each bundle actually builds on its OS.
#  - On a version tag (v*): also attaches each installer to the GitHub release.
#
# All three override beforeBuildCommand to a no-op (frontend + sidecar are
# built as explicit, cacheable steps instead) and disable
# `createUpdaterArtifacts` (its minisign key is a separate release secret) via
# the same ci-override.json trick. The Windows job additionally forces
# `--bundles nsis` and signs externally with signtool, since beforeBuildCommand
# is bash-only and Tauri would otherwise run it via cmd on Windows — so
# windows-installer does NOT depend on bundle.windows config or on
# beforeBuildCommand being cross-platform. linux-installer and macos-installer
# were added later, once Linux Tauri bundling was verified locally to need no
# extra system setup beyond the standard Tauri Linux prerequisites, and macOS
# was proven able to cross-build both architectures on one macos-latest runner
# (see release-cli.yml's existing CLI build matrix, the same pattern reused
# here) — a universal (lipo'd) single .dmg was considered but skipped for now:
# it would also require manually lipo-ing the `belay` sidecar (Tauri only
# lipo's its own binary automatically), which has no real Mac available here
# to verify, so two per-architecture .dmg's (mirroring how the CLI already
# ships two separate binaries rather than one universal one) was the safer
# choice.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
  pull_request:
    paths: ['desktop/**', 'web/**', '.github/workflows/release-desktop.yml']

permissions:
  contents: write   # only the tag -> release attach step uses it

jobs:
  windows-installer:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      # Refuse to publish a tagged public release unless the native malware-scan
      # feature's legal sign-off gate (docs/MALWARE_SCAN_LEGAL_GATE.md) was
      # confirmed SIGNED OFF. Scoped to tag pushes only
      # (startsWith(github.ref, 'refs/tags/')) — this job doubles as the
      # ordinary unsigned PR regression build, which must keep working
      # regardless of gate state.
      #
      # docs/ (including the gate doc) is excluded from the public export, so
      # this job — which runs on the PUBLIC repo's checkout — cannot read that
      # doc directly. The real, fail-closed check runs against the source doc
      # in packaging/export-open-repo.sh on every sync; that script leaves a
      # .legal-gate-signoff marker in the export ONLY after its check passes,
      # and this step just confirms that marker made it into the release commit.
      - name: Legal gate — malware-scan sign-off (tagged release only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          marker=".legal-gate-signoff"
          # Fail closed: a missing marker means the export-time gate either
          # never ran or didn't pass — cannot confirm sign-off.
          if [ ! -r "$marker" ]; then
            echo "::error::refusing to publish: sign-off marker missing ($marker) — the export-time legal gate (packaging/export-open-repo.sh) did not confirm malware-scan sign-off for this commit"
            exit 1
          fi
          cat "$marker"

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: Swatinem/rust-cache@v2

      # Fetch a PREBUILT cargo-tauri (seconds) instead of compiling tauri-cli from
      # source (~19 min every run — cargo-installed binaries aren't restored by
      # rust-cache). cargo-binstall downloads tauri-cli's published binary and
      # falls back to a source build only if no prebuilt exists.
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Fetch prebuilt tauri-cli
        run: cargo binstall -y tauri-cli --version '^2'

      # Build the React frontend into web/dist (tauri build.frontendDist = ../../web/dist).
      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      # Stage the unified binary as the Tauri sidecar
      # (externalBin "binaries/belay" -> binaries/belay-<triple>.exe).
      - name: Build + stage sidecar
        run: |
          triple="$(rustc -vV | sed -n 's/^host: //p')"
          echo "target triple: $triple"
          # Match the product feature set (build-belay.sh): channels = messaging
          # approvals, ai = BYOK explainer, netenrich = destination enrichment.
          # A plain `cargo build` would ship a Windows daemon with none of these.
          cargo build --release --bin belay --features channels,ai,netenrich
          mkdir -p desktop/src-tauri/binaries
          cp "target/release/belay.exe" "desktop/src-tauri/binaries/belay-${triple}.exe"

      # beforeBuildCommand is bash-only and Tauri runs it via cmd on Windows, so
      # override it to a no-op (we already built the frontend + sidecar). Force the
      # NSIS bundle regardless of the config's targets list, and skip the updater
      # artifact (its minisign key is a separate release secret).
      - name: Build NSIS installer (unsigned)
        working-directory: desktop/src-tauri
        run: |
          echo '{"build":{"beforeBuildCommand":""},"bundle":{"createUpdaterArtifacts":false}}' > ci-override.json
          cargo tauri build --bundles nsis --config ci-override.json

      - name: Locate installer
        id: find
        run: |
          f="$(ls desktop/src-tauri/target/release/bundle/nsis/*-setup.exe | head -1)"
          if [ -z "$f" ]; then echo "no NSIS installer produced" >&2; exit 1; fi
          echo "installer=$f" >> "$GITHUB_OUTPUT"
          echo "Installer: $f"

      # Secrets can't be referenced in a step `if:`, so map presence to an output here.
      - name: Detect signing secret
        id: cert
        env:
          CERT: ${{ secrets.WINDOWS_CERTIFICATE }}
        run: |
          if [ -n "${CERT:-}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::WINDOWS_CERTIFICATE secret not set — installer left UNSIGNED (regression build only)."
          fi

      - name: Authenticode-sign installer
        if: steps.cert.outputs.present == 'true'
        shell: pwsh
        env:
          CERT: ${{ secrets.WINDOWS_CERTIFICATE }}
          CERT_PW: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'cs.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:CERT))
          $signtool = (Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe' |
                       Sort-Object FullName | Select-Object -Last 1).FullName
          if (-not $signtool) { throw 'signtool.exe not found (install the Windows SDK)' }
          $installer = '${{ steps.find.outputs.installer }}'
          & $signtool sign /f $pfx /p $env:CERT_PW /fd sha256 /tr http://timestamp.digicert.com /td sha256 $installer
          if ($LASTEXITCODE -ne 0) { throw 'signtool sign failed' }
          & $signtool verify /pa /v $installer
          if ($LASTEXITCODE -ne 0) { throw 'signtool verify failed' }
          Remove-Item $pfx -Force

      # Stage a STABLE-named copy of the (now signed, if a cert was present)
      # installer + its checksum, plus the PowerShell bootstrap. install.ps1
      # fetches these fixed names ("belay-setup-x64.exe" / ".sha256") so the
      # one-liner URL never has to know the version.
      - name: Stage release assets (stable name + checksum)
        run: |
          mkdir -p dist
          cp "${{ steps.find.outputs.installer }}" dist/belay-setup-x64.exe
          ( cd dist && sha256sum belay-setup-x64.exe > belay-setup-x64.exe.sha256 )
          cp packaging/install.ps1 dist/install.ps1
          echo "staged:"; ls -la dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: belay-desktop-nsis
          path: |
            ${{ steps.find.outputs.installer }}
            dist/belay-setup-x64.exe
            dist/belay-setup-x64.exe.sha256
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # The stable-named pair is what install.ps1's GitHub fallback fetches;
          # the original versioned installer is kept for humans browsing releases.
          files: |
            ${{ steps.find.outputs.installer }}
            dist/belay-setup-x64.exe
            dist/belay-setup-x64.exe.sha256

      # Publish to the CDN so `irm https://dl.belay.secblok.io/install.ps1 | iex`
      # works. Guarded on the token: absent -> skipped (the GitHub-release
      # fallback above still makes the one-liner work). Secrets required:
      # CLOUDFLARE_API_TOKEN (R2 edit), CLOUDFLARE_ACCOUNT_ID; R2_BUCKET var
      # defaults to "belay".
      - name: Detect R2 secret
        id: r2
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "${CF:-}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN not set - skipping R2 publish (GitHub-release fallback still works)."
          fi

      - name: Publish install.ps1 + installer to R2
        if: steps.r2.outputs.present == 'true' && startsWith(github.ref, 'refs/tags/')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ vars.R2_BUCKET || 'belay' }}
        run: |
          npm i -g wrangler@3
          # --remote is REQUIRED or wrangler writes to a local sim store the CDN never sees.
          wrangler r2 object put "$R2_BUCKET/install.ps1" --file dist/install.ps1 --content-type 'text/plain; charset=utf-8' --remote
          wrangler r2 object put "$R2_BUCKET/belay-setup-x64.exe" --file dist/belay-setup-x64.exe --content-type 'application/octet-stream' --remote
          wrangler r2 object put "$R2_BUCKET/belay-setup-x64.exe.sha256" --file dist/belay-setup-x64.exe.sha256 --content-type 'text/plain; charset=utf-8' --remote

  linux-installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Same marker-based gate as windows-installer above — see that job's
      # comment for why this checks a marker instead of the (excluded from the
      # public export) legal-gate doc directly.
      - name: Legal gate — malware-scan sign-off (tagged release only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          marker=".legal-gate-signoff"
          if [ ! -r "$marker" ]; then
            echo "::error::refusing to publish: sign-off marker missing ($marker) — the export-time legal gate (packaging/export-open-repo.sh) did not confirm malware-scan sign-off for this commit"
            exit 1
          fi
          cat "$marker"

      # Standard Tauri v2 Linux prerequisites. A clean ubuntu-latest runner has
      # none of these; verified locally on a box that already had them that
      # `cargo tauri build --bundles deb,appimage` needs no more than this list.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Fetch prebuilt tauri-cli
        run: cargo binstall -y tauri-cli --version '^2'

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Build + stage sidecar
        run: |
          triple="$(rustc -vV | sed -n 's/^host: //p')"
          echo "target triple: $triple"
          cargo build --release --bin belay --features channels,ai,netenrich
          mkdir -p desktop/src-tauri/binaries
          cp "target/release/belay" "desktop/src-tauri/binaries/belay-${triple}"

      - name: Build deb + AppImage (unsigned)
        working-directory: desktop/src-tauri
        run: |
          echo '{"build":{"beforeBuildCommand":""},"bundle":{"createUpdaterArtifacts":false}}' > ci-override.json
          cargo tauri build --bundles deb,appimage --config ci-override.json

      - name: Locate installers
        id: find
        run: |
          deb="$(ls desktop/src-tauri/target/release/bundle/deb/*.deb | head -1)"
          appimage="$(ls desktop/src-tauri/target/release/bundle/appimage/*.AppImage | head -1)"
          if [ -z "$deb" ] || [ -z "$appimage" ]; then echo "installer(s) not produced" >&2; exit 1; fi
          echo "deb=$deb" >> "$GITHUB_OUTPUT"
          echo "appimage=$appimage" >> "$GITHUB_OUTPUT"
          echo "deb: $deb"; echo "appimage: $appimage"

      # Tauri's own filenames carry the version (Belay_<ver>_amd64.deb), so a
      # download link naming them breaks every release. Stable-named copies +
      # per-file checksums, same convention as the Windows job's
      # belay-setup-x64.exe / belay-setup-x64.exe.sha256 — NOT a combined
      # SHA256SUMS file, since release-cli.yml already attaches one with that
      # exact name to the same release and softprops/action-gh-release
      # overwrites same-named assets (a combined file here would silently
      # clobber the CLI binaries' checksums).
      - name: Stage release assets (stable name + checksum)
        run: |
          mkdir -p dist
          cp "${{ steps.find.outputs.deb }}" dist/belay-amd64.deb
          cp "${{ steps.find.outputs.appimage }}" dist/belay-amd64.AppImage
          ( cd dist && sha256sum belay-amd64.deb > belay-amd64.deb.sha256 )
          ( cd dist && sha256sum belay-amd64.AppImage > belay-amd64.AppImage.sha256 )
          echo "staged:"; ls -la dist

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: belay-desktop-linux
          path: |
            ${{ steps.find.outputs.deb }}
            ${{ steps.find.outputs.appimage }}
            dist/belay-amd64.deb
            dist/belay-amd64.AppImage
            dist/belay-amd64.deb.sha256
            dist/belay-amd64.AppImage.sha256
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.find.outputs.deb }}
            ${{ steps.find.outputs.appimage }}
            dist/belay-amd64.deb
            dist/belay-amd64.AppImage
            dist/belay-amd64.deb.sha256
            dist/belay-amd64.AppImage.sha256

  macos-installer:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # `arch` is the stable-name suffix (belay-<arch>.dmg) — matches the
          # Windows job's belay-setup-x64.exe convention, decoupled from
          # Tauri's own versioned filename.
          - target: x86_64-apple-darwin
            arch: x64
          - target: aarch64-apple-darwin
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Legal gate — malware-scan sign-off (tagged release only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          marker=".legal-gate-signoff"
          if [ ! -r "$marker" ]; then
            echo "::error::refusing to publish: sign-off marker missing ($marker) — the export-time legal gate (packaging/export-open-repo.sh) did not confirm malware-scan sign-off for this commit"
            exit 1
          fi
          cat "$marker"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Fetch prebuilt tauri-cli
        run: cargo binstall -y tauri-cli --version '^2'

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Build + stage sidecar
        run: |
          cargo build --release --target ${{ matrix.target }} --bin belay --features channels,ai,netenrich
          mkdir -p desktop/src-tauri/binaries
          cp "target/${{ matrix.target }}/release/belay" "desktop/src-tauri/binaries/belay-${{ matrix.target }}"

      - name: Build dmg + app (unsigned)
        working-directory: desktop/src-tauri
        run: |
          echo '{"build":{"beforeBuildCommand":""},"bundle":{"createUpdaterArtifacts":false}}' > ci-override.json
          cargo tauri build --target ${{ matrix.target }} --bundles dmg,app --config ci-override.json

      - name: Locate installer
        id: find
        run: |
          f="$(ls desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -1)"
          if [ -z "$f" ]; then echo "no dmg produced" >&2; exit 1; fi
          echo "dmg=$f" >> "$GITHUB_OUTPUT"
          echo "dmg: $f"

      # Tauri's own filename carries the version (Belay_<ver>_x64.dmg), so a
      # download link naming it breaks every release. Stable name + per-file
      # checksum, same convention as the Windows/Linux jobs.
      - name: Stage release assets (stable name + checksum)
        run: |
          mkdir -p dist
          cp "${{ steps.find.outputs.dmg }}" "dist/belay-${{ matrix.arch }}.dmg"
          ( cd dist && shasum -a 256 "belay-${{ matrix.arch }}.dmg" > "belay-${{ matrix.arch }}.dmg.sha256" )
          echo "staged:"; ls -la dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: belay-desktop-dmg-${{ matrix.target }}
          path: |
            ${{ steps.find.outputs.dmg }}
            dist/belay-${{ matrix.arch }}.dmg
            dist/belay-${{ matrix.arch }}.dmg.sha256
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.find.outputs.dmg }}
            dist/belay-${{ matrix.arch }}.dmg
            dist/belay-${{ matrix.arch }}.dmg.sha256
